<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Golden Mean Studio</title>
  <link rel="icon" type="image/png" href="../../assets/brand/favicon.png" />
  <link rel="apple-touch-icon" href="../../assets/brand/logo.png" />
  <link rel="stylesheet" href="css/app.css?v=0.9.17" />
  <link rel="stylesheet" href="css/presentation.css" />
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>

  <header class="topbar glass">
    <div class="topbar-inner">
      <a class="brand" href="./" aria-label="Golden Mean Studio 首页">
        <img class="brand-logo" src="../../assets/brand/logo.png" width="32" height="32" alt="" />
        <span class="brand-text">
          <span id="company-name">Golden Mean Studio</span>
          <span class="brand-tagline" id="company-tagline"></span>
        </span>
      </a>
      <nav class="nav-pill glass-inner" aria-label="主导航">
        <button class="nav-item active" data-view="overview">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>
          <span>概览</span>
        </button>
        <button class="nav-item" data-view="projects">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
          <span>项目</span>
        </button>
        <button class="nav-item" data-view="clients">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          <span>客户</span>
        </button>
        <button class="nav-item" data-view="inbox">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 4H9l-3-4H2"/><path d="M5.5 5.5 2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.5-6.5A2 2 0 0016.76 4H7.24a2 2 0 00-1.74 1.5z"/></svg>
          <span>收件箱</span>
          <em class="nav-badge" id="inbox-badge">0</em>
        </button>
        <button class="nav-item" data-view="costs">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6"/></svg>
          <span>经营</span>
        </button>
        <button class="nav-item" data-view="weekly">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v4M16 2v4"/><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M3 10h18M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
          <span>周报</span>
          <em class="nav-badge" id="weekly-badge" hidden>1</em>
        </button>
        <button class="nav-item" data-view="settings">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 00-2 1.42l-.18.86a2 2 0 01-1.94 1.58h-.78a2 2 0 00-1.94 1.58l-.18.86a2 2 0 01-2 1.42h-.44a2 2 0 00-2 2v.44a2 2 0 001.42 2l.86.18a2 2 0 011.58 1.94v.78a2 2 0 001.58 1.94l.86.18a2 2 0 011.42 2h.44a2 2 0 002-1.42l.18-.86a2 2 0 011.94-1.58h.78a2 2 0 001.94-1.58l.18-.86a2 2 0 012-1.42h.44a2 2 0 002-2v-.44a2 2 0 00-1.42-2l-.86-.18a2 2 0 01-1.58-1.94v-.78a2 2 0 00-1.58-1.94l-.86-.18a2 2 0 01-2-1.42z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>设置</span>
        </button>
      </nav>
    </div>
  </header>

  <main class="main">
    <!-- 公司概览 -->
    <section id="view-overview" class="view active">
      <div class="pulse-bar glass" id="pulse-bar"></div>
      <div class="orchestration-banner glass-inner" id="orchestration-banner" hidden></div>
      <div class="overview-stage glass" id="overview-stage">
        <svg class="collab-lines" id="collab-svg" aria-hidden="true"></svg>
        <div class="dispatch-bubbles" id="dispatch-bubbles"></div>
        <div class="role-nodes" id="role-nodes"></div>
      </div>
      <div class="overview-collab glass-inner" id="overview-collab" hidden></div>
      <div class="overview-footer glass-inner" id="overview-footer"></div>
      <p class="hint">点击成员查看任务 · 对话气泡 = 派活/回复/交付 · 约 8–14 秒后淡出 · 彩色连线可点进工作室</p>
    </section>

    <!-- 项目看板 -->
    <section id="view-projects" class="view">
      <div class="stats-row" id="stats-row"></div>
      <div class="projects-grid" id="projects-grid"></div>
    </section>

    <!-- 客户档案 -->
    <section id="view-clients" class="view">
      <div id="clients-root"></div>
    </section>

    <!-- 收件箱：必读 + 请示 + 审批 -->
    <section id="view-inbox" class="view">
      <div class="inbox-filters" id="inbox-filters"></div>
      <div class="inbox-list" id="inbox-list"></div>
      <div class="inbox-reject" id="inbox-reject" hidden></div>
    </section>

    <!-- 经营：成本 + 收入毛利 -->
    <section id="view-costs" class="view">
      <div id="costs-root"></div>
    </section>

    <!-- CEO 周报 -->
    <section id="view-weekly" class="view weekly-v2">
      <div id="weekly-root"></div>
    </section>

    <!-- 设置 · 角色 API 配置 -->
    <section id="view-settings" class="view">
      <div id="settings-root"></div>
    </section>
  </main>

  <!-- CEO 通道 FAB -->
  <button class="fab glass" id="fab-ceo" title="CEO 办公室">
    <img src="../../assets/avatars/ceo.png" alt="CEO"/>
  </button>

  <!-- 通用弹窗 -->
  <div class="modal-backdrop" id="modal-backdrop" hidden>
    <div class="modal glass" id="modal-panel" role="dialog" aria-modal="true">
      <button class="modal-close" id="modal-close" aria-label="关闭">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- 项目工作室（全屏） -->
  <div class="sheet-backdrop" id="sheet-backdrop" hidden>
    <div class="sheet glass" id="workroom-sheet">
      <header class="sheet-head">
        <button class="back-btn" id="sheet-close">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div class="sheet-title" id="sheet-title"></div>
        <div class="sheet-stage-line" id="sheet-stage-line"></div>
        <div class="project-export-wrap" id="project-export-wrap"></div>
      </header>
      <div class="sheet-project-bar glass-inner" id="sheet-project-bar" hidden></div>
      <div class="workroom">
        <aside class="workroom-nav glass-inner" id="workroom-nav"></aside>
        <div class="workroom-main">
          <div class="workroom-focus glass-inner" id="workroom-focus" hidden></div>
          <article class="workroom-content glass-inner" id="workroom-content"></article>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
  <script src="js/api.js?v=0.9.16"></script>
  <script src="js/icons.js?v=0.9.16"></script>
  <script src="js/presentation.js?v=0.9.16"></script>
  <script src="js/pdf-export.js?v=0.9.16"></script>
  <script src="js/workroom.js?v=0.9.16"></script>
  <script src="js/weekly.js?v=0.9.16"></script>
  <script src="js/finance.js?v=0.9.17"></script>
  <script src="js/settings.js?v=0.9.17"></script>
  <script src="js/app.js?v=0.9.17"></script>
</body>
</html>
